# ==============================
# SERVER
# ==============================
server.port=8080
server.error.include-message=never
server.error.include-binding-errors=never
server.error.include-stacktrace=never

# ==============================
# DATABASE
# ==============================
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/umdb}
spring.datasource.username=${DB_USERNAME:um_user}
spring.datasource.password=${DB_PASSWORD:}

# Optional but recommended
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}

# ==============================
# JPA / HIBERNATE
# ==============================
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false

# ==============================
# JWT SECURITY
# ==============================
security.jwt.issuer=um-api
security.jwt.audience=um-clients
security.jwt.ttl-seconds=${JWT_TTL_SECONDS:3600}
security.jwt.secret=${JWT_SECRET}   # MUST be set in environment

# ==============================
# BOOTSTRAP ADMIN
# ==============================
security.bootstrap-admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
security.bootstrap-admin.setup-token-hash=${BOOTSTRAP_ADMIN_TOKEN_HASH:}

# ==============================
# XML IMPORT LIMITS (SECURITY HARDENING)
# ==============================
security.import.xml.max-bytes=${IMPORT_XML_MAX_BYTES:1048576}
security.import.xml.max-records=${IMPORT_XML_MAX_RECORDS:5000}
security.import.xml.skip-existing-email=${IMPORT_XML_SKIP_EXISTING_EMAIL:true}

# ==============================
# LDAP (DISABLED BY DEFAULT)
# ==============================
security.ldap.enabled=${LDAP_ENABLED:false}
security.ldap.urls=${LDAP_URLS:}
security.ldap.base=${LDAP_BASE_DN:}
security.ldap.bind-dn=${LDAP_BIND_DN:}
security.ldap.bind-password=${LDAP_BIND_PASSWORD:}
security.ldap.user-search-base=${LDAP_USER_SEARCH_BASE:ou=people}
security.ldap.search-timeout-ms=${LDAP_SEARCH_TIMEOUT_MS:3000}
security.ldap.count-limit=${LDAP_COUNT_LIMIT:5}
security.ldap.return-attributes=${LDAP_RETURN_ATTRIBUTES:dn,uid,cn,mail}

# ==============================
# PASSWORD RESET (SECURE)
# ==============================
security.password-reset.ttl-seconds=${PASSWORD_RESET_TTL_SECONDS:900}
security.password-reset.token-bytes=${PASSWORD_RESET_TOKEN_BYTES:32}
security.password-reset.hmac-secret=${PASSWORD_RESET_HMAC_SECRET}  # MUST be set

# ==============================
# GENERAL SECURITY HARDENING
# ==============================
server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=true
server.servlet.session.cookie.same-site=strict

# Disable default whitelabel error page
server.error.whitelabel.enabled=false